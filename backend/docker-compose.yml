# Specify the Docker Compose file format version (3.8 is widely supported)
version: '3.8'

# The 'services' section defines the different applications (containers) we want to run
services:
  
  # 1. Our Node.js Backend Server
  backend:
    # Build the Docker image using the Dockerfile in the current directory ('.')
    build: .
    # Give the container a simple name so we can easily start/stop it
    container_name: backend
    # Map port 5000 on your host computer to port 5000 inside the container.
    # This is required so you can access the API from your browser at localhost:5000
    ports:
      - "5000:5000"
    # Pass environment variables to the backend container
    environment:
      - PORT=5000
    # Tell Docker to start 'postgres' and 'qdrant' before starting the backend
    depends_on:
      - postgres
      - qdrant
    # Automatically restart this container if it crashes or the computer reboots, 
    # unless you manually stop it yourself.
    restart: unless-stopped

  # 2. PostgreSQL Database (For storing users and general app data)
  postgres:
    # Download and use the official PostgreSQL version 15 image from Docker Hub
    image: postgres:15
    container_name: postgres
    # Securely load the database credentials from your local .env file
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Mount a "volume" to save database data permanently.
    # Without this, all your data would be erased every time the container stops!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 3. Qdrant Vector Database (For storing AI embeddings / PDF knowledge)
  qdrant:
    # Download the latest official Qdrant image
    image: qdrant/qdrant:latest
    container_name: qdrant
    # Mount a volume to save your AI vector data permanently
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

# This section officially declares the named volumes we used above.
# Docker will manage these folders on your hard drive to keep your data safe.
volumes:
  postgres_data:
  qdrant_data:
